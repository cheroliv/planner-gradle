name: Decompose Intention
on:
  workflow_dispatch:
    inputs:
      intention:
        description: 'Intention en langage naturel'
        required: true
      feature_request_id:
        description: 'ID de la Feature Request associée (optionnel)'
        required: false
jobs:
  decompose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Install Ollama Binary
        run: |
          curl -L https://ollama.com/download/ollama-linux-amd64.tgz -o /tmp/ollama.tgz
          tar xzf /tmp/ollama.tgz -C /tmp
          sudo mv /tmp/ollama /usr/local/bin/
          sudo mv /tmp/lib/ollama /usr/local/lib/ollama

      - name: Setup Device Key
        run: |
          mkdir -p ~/.ollama
          echo "${{ secrets.OLLAMA_DEVICE_KEY_A }}" > ~/.ollama/id_ed25519
          chmod 600 ~/.ollama/id_ed25519

      - name: Start Ollama Serve
        run: |
          OLLAMA_HOST=0.0.0.0:11434 ollama serve &>/tmp/ollama.log &
          for i in $(seq 1 30); do
            if curl -s http://localhost:11434/api/version >/dev/null 2>&1; then
              echo "Ollama ready"
              break
            fi
            sleep 1
          done

      - name: Pull Cloud Models
        run: |
          ollama pull qwen3.5:397b-cloud
          ollama pull deepseek-v4-pro:cloud

      - name: Decompose Intention
        run: >
          ./gradlew decomposeIntention
          -Pintention="${{ github.event.inputs.intention }}"
          -Pfeature.request.id="${{ github.event.inputs.feature_request_id }}"
        env:
          OLLAMA_DEVICE_KEY_A: ${{ secrets.OLLAMA_DEVICE_KEY_A }}
          OLLAMA_DEVICE_KEY_B: ${{ secrets.OLLAMA_DEVICE_KEY_B }}

      - name: Commit Plan to Repository
        if: ${{ github.event.inputs.feature_request_id != '' }}
        run: |
          git config user.name "ci-bot"
          git config user.email "ci-bot@cheroliv.com"
          git add features/plans/
          git commit -m "ci: plan for ${{ github.event.inputs.feature_request_id }}" || true
          git push

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plan-${{ github.run_id }}
          path: build/planning/*.json
